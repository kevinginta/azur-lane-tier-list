name: Refresh ship images

on:
  schedule:
    # Every Tuesday 06:00 UTC - a few hours after Lycoris-AzurAPI's own
    # weekly Monday refresh, so this run sees that week's new data.
    - cron: "0 6 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch any newly-available ship icons
        run: python fetch_images.py

      - name: Commit and push new icons
        run: |
          if [ -z "$(git status --porcelain images)" ]; then
            echo "No new images found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images
          git commit -m "Auto-refresh ship icons"
          git push
